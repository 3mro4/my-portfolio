<section id="education" class="py-5">
  <div class="container">

    <!-- Section Title -->
    <div class="row">
      <div class="col-12 text-center mb-5">
        <h2 class="section-title">{{ lang.t().education.title }}</h2>
        <div class="title-underline"></div>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8">

        <!-- University -->
        <div class="education-card">
          <div class="education-icon">
            <i class="bi bi-mortarboard-fill"></i>
          </div>
          <div class="education-content">
            <div class="education-header">
              <div>
                <h4 class="degree-title">{{ lang.t().education.degree }}</h4>
                <h5 class="university-name">
                  <i class="bi bi-building me-2"></i>
                  {{ lang.t().education.university }}
                </h5>
              </div>
              <span class="education-date">
                <i class="bi bi-calendar3 me-1"></i>{{ lang.t().education.date }}
              </span>
            </div>
            <p class="education-desc">{{ lang.t().education.desc }}</p>
            <div class="tags">
              <span class="tag">Computer Science</span>
              <span class="tag">Algorithms</span>
              <span class="tag">Data Structures</span>
              <span class="tag">Software Engineering</span>
              <span class="tag">AI</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
