<section id="about" class="py-5 reveal">
  <div class="container">

    <!-- Section Title -->
    <div class="row">
      <div class="col-12 text-center mb-5">
        <h2 class="section-title">{{ lang.t().about.title }}</h2>
        <div class="title-underline"></div>
      </div>
    </div>

    <!-- Content -->
    <div class="row align-items-center">

      <!-- Left: Avatar -->
      <div class="col-lg-4 text-center mb-4 mb-lg-0">
        <div>
          <span>
            <img src="assets/myphoto.png" alt="Profile Image" style="width: 250px; height: 250px;" />
          </span>
        </div>
        <!-- Info badges -->
        <div class="info-badges mt-4">
          <span class="badge-item">
            <i class=""></i> {{ lang.t().about.badge1 }}
          </span>
          <span class="badge-item">
            <i class=""></i> {{ lang.t().about.badge2 }}
          </span>
          <span class="badge-item">
            <i class=""></i> {{ lang.t().about.badge3 }}
          </span>
        </div>
      </div>

      <!-- Right: Text -->
      <div class="col-lg-8">
        <h3 class="about-heading">{{ lang.t().about.subtitle }}</h3>
        <p class="about-text">{{ lang.t().about.p1 }}</p>
        <p class="about-text">{{ lang.t().about.p2 }}</p>
        <!-- <p class="about-text">{{ lang.t().about.p3 }}</p> -->

        <!-- Quick Stats -->
        <div class="row mt-4">
          <div class="col-4 text-center">
            <div class="stat-box">
              <h4>2+</h4>
              <p>{{ lang.t().about.stat1 }}</p>
            </div>
          </div>
          <div class="col-4 text-center">
            <div class="stat-box">
              <h4>3+</h4>
              <p>{{ lang.t().about.stat2 }}</p>
            </div>
          </div>
          <div class="col-4 text-center">
            <div class="stat-box">
              <h4>7+</h4>
              <p>{{ lang.t().about.stat3 }}</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
